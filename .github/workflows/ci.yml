name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4
        with:
          args: check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # hatch-vcs derives the version from tags
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install pinned pandoc + poppler
        run: |
          VER=$(cat tests/parity/PANDOC_VERSION)
          wget -q "https://github.com/jgm/pandoc/releases/download/${VER}/pandoc-${VER}-1-amd64.deb"
          sudo dpkg -i "pandoc-${VER}-1-amd64.deb"
          pandoc --version | head -1 | grep -qF "pandoc ${VER}"
          sudo apt-get update -q && sudo apt-get install -y -q poppler-utils
      - run: pip install -e .[test]
      - run: pytest -ra
